# MultiQC configuration for rna-dexamethasone pipeline
report_header_info:
  - Contact Email: "your@email.com"
  - Application Type: "RNA-seq"
  - Project: "GSE52778 - Dexamethasone Airway Smooth Muscle"

report_comment: |
  This report was generated by the rna-dexamethasone Nextflow pipeline.
  Dataset: GSE52778 | Organism: Homo sapiens (GRCh38) | Treatment: Dexamethasone

top_modules:
  - fastqc
  - fastp
  - star
  - featureCounts

module_order:
  - fastqc:
      name: "FastQC (raw)"
  - fastp:
      name: "fastp (trimmed)"
  - star
  - featureCounts

fn_ignore_files:
  - "*.bam"
  - "*.bai"

plots_force_interactive: true

custom_plot_config:
  general_stats_table_rank_limit: 30
